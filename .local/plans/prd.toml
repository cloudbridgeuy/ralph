  "Verify output blocks accumulated before interruption are present",
  "Repeat with SIGTERM",
]
passes = true
acceptance = [
  "Signal handlers are installed for SIGTERM and SIGINT",
  "On signal, the accumulated Vec<OutputBlock> is serialized before exit",
