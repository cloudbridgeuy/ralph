[[stories]]
category = "replay"
description = "As a user, I want to pause for a configurable number of seconds between each output block during replay so I can follow the output at my own pace."
steps = [
  "Run `ralph replay <slug> --delay 2` for a session with multiple output blocks",
  "Observe that each block is rendered with a 2-second pause before the next",
  "Run `ralph replay <slug>` without --delay",
  "Observe that blocks render immediately with no pause (default behavior)",
  "Run `ralph replay <slug> --delay 0.5`",
  "Observe that fractional seconds are supported",
]
passes = true
acceptance = [
  "A `--delay <seconds>` flag is added to the replay command",
  "The flag accepts positive floating-point values (e.g., 0.5, 1, 2.5)",
  "When provided, replay pauses for the specified duration between each output block",
  "When omitted, replay behaves as before with no delay (zero cost default)",
  "The flag is documented in `--help` output",
]

[[stories]]
category = "lint"
description = "As a developer, I want the lint command to fail if any Rust file exceeds 1000 lines so that large files are flagged for refactoring."
steps = [
  "Run `cargo xtask lint` on a codebase where all .rs files are under 1000 lines",
  "Observe that the file length check passes",
  "Create or modify a .rs file to exceed 1000 lines",
  "Run `cargo xtask lint` again",
  "Observe that the check fails and reports the offending file(s) with their line counts",
]
passes = true
acceptance = [
  "A file length check is added to the lint command",
  "The check scans all .rs files in the workspace (including tests)",
  "Files exceeding 1000 lines cause the lint to fail",
  "The error output lists each violating file with its path and line count",
  "Files at or under 1000 lines pass silently",
]

[[stories]]
category = "replay"
description = "As a user, I want to see a spinner with a countdown during the delay between blocks so I know when the next block will appear."
steps = [
  "Run `ralph replay <slug> --delay 3` for a session with multiple output blocks",
  "Observe a spinner appears after each block with a countdown (e.g., 'Next block in 3s...')",
  "Observe the countdown decrements each second until the next block renders",
  "Observe the spinner clears before the next block appears",
]
passes = true
acceptance = [
  "A spinner with countdown is displayed between blocks when --delay is used",
  "The countdown shows remaining seconds (updating each second)",
  "The spinner is cleared before rendering the next block",
  "No spinner is shown when --delay is omitted or set to 0",
]

[[stories]]
category = "replay"
description = "As a user, I want to press a key to skip the countdown and immediately show the next block so I can speed through familiar content."
steps = [
  "Run `ralph replay <slug> --delay 5` for a session with multiple output blocks",
  "While the countdown spinner is active, press a skip key (e.g., 'n' or Space)",
  "Observe the countdown is cancelled and the next block renders immediately",
]
passes = false
acceptance = [
  "Pressing a designated key during the countdown skips to the next block",
  "The skip key is documented in the spinner display (e.g., 'Next block in 3s... [n: next]')",
  "Skipping works reliably without blocking or delays",
]

[[stories]]
category = "replay"
description = "As a user, I want to pause and resume the replay so I can take time to read content without the countdown progressing."
steps = [
  "Run `ralph replay <slug> --delay 3` for a session with multiple output blocks",
  "While the countdown spinner is active, press a pause key (e.g., 'p' or Space)",
  "Observe the countdown pauses and the spinner indicates paused state",
  "Press the pause key again to resume",
  "Observe the countdown resumes from where it left off",
]
passes = false
acceptance = [
  "Pressing a designated key toggles pause/play during the countdown",
  "The paused state is visually indicated (e.g., 'Paused [p: play]')",
  "The countdown resumes from the remaining time, not from the beginning",
  "The pause/play key is documented in the spinner display",
]

[[stories]]
category = "prompt-display"
description = "As a user, I want attached files displayed as a formatted table with descriptions so I can understand what each file represents."
steps = [
  "Run ralph with a prompt that includes attached files (design, prd, progress)",
  "Observe the '▶ Prompt' section displays files as a table with columns for path and description",
  "Verify each file shows its known description (e.g., 'Design document', 'Product requirements', 'Progress notes')",
  "Verify the table renders correctly in both terminal and piped output",
]
passes = false
acceptance = [
  "PromptDisplay struct includes file metadata (path and description pairs)",
  "Display functions render files as a formatted table before the prompt body",
  "Known files use their assigned descriptions: design.md → 'Design document', prd.toml → 'Product requirements', progress.txt → 'Progress notes'",
  "Inline @/path references are removed from the prompt body display",
  "Table formatting works for both terminal (with colors) and plain output",
]

[[stories]]
category = "spinner"
description = "As a user, I want the spinner timer display to clear properly when the text length changes so residual characters don't appear."
steps = [
  "Run ralph and trigger a long-running LLM request",
  "Observe the spinner as time progresses past minute boundaries (e.g., 59s → 1m 0s)",
  "Observe the spinner when context changes (e.g., 'Thinking...' to 'Running tool...')",
  "Verify no residual characters appear when the line gets shorter",
]
passes = true
acceptance = [
  "Spinner format uses '\\r\\x1b[K' to clear the line before each redraw",
  "No leftover characters appear when time format changes (e.g., '59s' → '1m 0s')",
  "No leftover characters appear when spinner context changes",
  "Spinner continues to display correctly in terminal output",
]

[[stories]]
category = "replay"
description = "As a developer, I want the legacy replay_chunks function removed so the codebase has no dead code."
steps = [
  "Search for replay_chunks function in the codebase",
  "Verify it no longer exists",
  "Run `cargo build` to confirm the code compiles",
  "Run `ralph replay <slug>` on a session with output_blocks to verify replay still works",
]
passes = true
acceptance = [
  "The replay_chunks function is deleted from replay.rs",
  "The fallback branch checking for empty output_blocks is removed",
  "replay_output_blocks is called directly without conditional",
  "Code compiles and tests pass",
]

[[stories]]
category = "prompt-display"
description = "As a user, I want the prompt content rendered as markdown so formatted text displays correctly in the terminal."
steps = [
  "Run ralph with a prompt containing markdown (headers, bold, code blocks, lists)",
  "Observe the '▶ Prompt' section renders markdown with proper formatting",
  "Verify headers, bold text, inline code, and code blocks are styled appropriately",
  "Verify plain (non-terminal) output remains raw text",
]
passes = false
acceptance = [
  "The existing MarkdownRenderer is used to render prompt content in terminal output",
  "Headers, bold, italic, inline code, and code blocks are rendered with appropriate styling",
  "Plain output (piped/non-terminal) displays raw text without ANSI codes",
  "Rendering is consistent with markdown styling used elsewhere in the app",
]

[[stories]]
category = "spinner"
description = "As a user, I want the spinner to display session name, current iteration, and remaining iterations so I can track progress during execution."
steps = [
  "Run ralph with a multi-iteration session",
  "Observe the spinner displays session name, iteration progress (e.g., 2/5), and time info",
  "Verify the format follows: '⠇ Running tool... Session: <name> | Iteration: 2/5 | 3m 43s | Total: 20m 40s'",
  "Verify the iteration count updates as iterations complete",
]
passes = false
acceptance = [
  "Spinner displays session name",
  "Spinner displays current iteration number and total iterations (e.g., 'Iteration: 2/5')",
  "Format uses segmented style with pipe separators",
  "Information updates correctly as iterations progress",
  "Session metadata is passed to the spinner context",
]
