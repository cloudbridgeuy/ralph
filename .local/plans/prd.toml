[[stories]]
category = "replay"
description = "As a user, I want to pause for a configurable number of seconds between each output block during replay so I can follow the output at my own pace."
steps = [
  "Run `ralph replay <slug> --delay 2` for a session with multiple output blocks",
  "Observe that each block is rendered with a 2-second pause before the next",
  "Run `ralph replay <slug>` without --delay",
  "Observe that blocks render immediately with no pause (default behavior)",
  "Run `ralph replay <slug> --delay 0.5`",
  "Observe that fractional seconds are supported",
]
passes = true
acceptance = [
  "A `--delay <seconds>` flag is added to the replay command",
  "The flag accepts positive floating-point values (e.g., 0.5, 1, 2.5)",
  "When provided, replay pauses for the specified duration between each output block",
  "When omitted, replay behaves as before with no delay (zero cost default)",
  "The flag is documented in `--help` output",
]

[[stories]]
category = "lint"
description = "As a developer, I want the lint command to fail if any Rust file exceeds 1000 lines so that large files are flagged for refactoring."
steps = [
  "Run `cargo xtask lint` on a codebase where all .rs files are under 1000 lines",
  "Observe that the file length check passes",
  "Create or modify a .rs file to exceed 1000 lines",
  "Run `cargo xtask lint` again",
  "Observe that the check fails and reports the offending file(s) with their line counts",
]
passes = false
acceptance = [
  "A file length check is added to the lint command",
  "The check scans all .rs files in the workspace (including tests)",
  "Files exceeding 1000 lines cause the lint to fail",
  "The error output lists each violating file with its path and line count",
  "Files at or under 1000 lines pass silently",
]

[[stories]]
category = "replay"
description = "As a user, I want to see a spinner with a countdown during the delay between blocks so I know when the next block will appear."
steps = [
  "Run `ralph replay <slug> --delay 3` for a session with multiple output blocks",
  "Observe a spinner appears after each block with a countdown (e.g., 'Next block in 3s...')",
  "Observe the countdown decrements each second until the next block renders",
  "Observe the spinner clears before the next block appears",
]
passes = false
acceptance = [
  "A spinner with countdown is displayed between blocks when --delay is used",
  "The countdown shows remaining seconds (updating each second)",
  "The spinner is cleared before rendering the next block",
  "No spinner is shown when --delay is omitted or set to 0",
]

[[stories]]
category = "replay"
description = "As a user, I want to press a key to skip the countdown and immediately show the next block so I can speed through familiar content."
steps = [
  "Run `ralph replay <slug> --delay 5` for a session with multiple output blocks",
  "While the countdown spinner is active, press a skip key (e.g., 'n' or Space)",
  "Observe the countdown is cancelled and the next block renders immediately",
]
passes = false
acceptance = [
  "Pressing a designated key during the countdown skips to the next block",
  "The skip key is documented in the spinner display (e.g., 'Next block in 3s... [n: next]')",
  "Skipping works reliably without blocking or delays",
]

[[stories]]
category = "replay"
description = "As a user, I want to pause and resume the replay so I can take time to read content without the countdown progressing."
steps = [
  "Run `ralph replay <slug> --delay 3` for a session with multiple output blocks",
  "While the countdown spinner is active, press a pause key (e.g., 'p' or Space)",
  "Observe the countdown pauses and the spinner indicates paused state",
  "Press the pause key again to resume",
  "Observe the countdown resumes from where it left off",
]
passes = false
acceptance = [
  "Pressing a designated key toggles pause/play during the countdown",
  "The paused state is visually indicated (e.g., 'Paused [p: play]')",
  "The countdown resumes from the remaining time, not from the beginning",
  "The pause/play key is documented in the spinner display",
]
