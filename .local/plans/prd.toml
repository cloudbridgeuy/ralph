# Ralph PRD - Key Mapping and stdout Integrity

[[stories]]
category = "internal"
actor = "developer"
description = "Ensure key mappings in ralph main loop work correctly without breaking stdout"
steps = [
  "Audit all code paths that enable raw terminal mode (crossterm::terminal::enable_raw_mode)",
  "Verify raw mode is always paired with disable_raw_mode in all exit paths (success, error, panic)",
  "Ensure raw mode is never active during subprocess execution that writes to stdout",
  "Add test coverage for key event classification (skip keys, pause keys, modifier handling)",
  "Verify countdown display clears properly before subprocess output resumes",
  "Test keyboard handling behavior when stdout is not a terminal (non-interactive mode)",
  "Document the raw mode lifecycle and its interaction with subprocess output in code comments",
]
passes = true
acceptance = [
  "Raw terminal mode is only enabled during countdown/pause UI, never during subprocess execution",
  "All raw mode enable calls have corresponding disable calls in finally-style cleanup (even on error/panic)",
  "Subprocess stdout output (from claude CLI) is never garbled or corrupted by terminal mode changes",
  "Key events (n, N, Space, p, P, Ctrl+C) are correctly classified and handled only when raw mode is active",
  "Unit tests exist for key classification functions covering all documented key mappings",
  "Non-terminal execution (piped output, CI) skips raw mode entirely and processes output correctly",
  "No regression in existing replay --delay functionality with skip/pause controls",
  "Manual testing confirms: ralph replay with --delay shows clean output interspersed with countdown UI",
]

# ============================================================================
# Keyboard Controls for Main Run Loop (ralph run)
# ============================================================================
# These stories implement interactive keyboard controls during iteration
# execution, following the layered implementation with signal propagation
# approach (Approach 1).
# ============================================================================

[[stories]]
category = "keyboard-control"
description = "Display key binding hints in the spinner during iteration execution"
steps = [
  "Run ralph with a multi-iteration session",
  "Observe the spinner display while an iteration is running",
  "Verify key hints appear in the spinner line (e.g., '[s: soft stop | S: hard stop | p: pause]')",
  "Verify hints update to '[finishing...]' when soft stop is requested",
  "Verify hints update to '[paused - p: resume]' when paused",
]
passes = true
acceptance = [
  "Spinner line includes key binding hints when running in interactive terminal",
  "Key hints are hidden when stdout is not a TTY (non-interactive mode)",
  "Hints dynamically update to reflect current state (running, finishing, paused)",
  "Spinner animation continues smoothly with hints displayed",
]

[[stories]]
category = "keyboard-control"
description = "Enable raw terminal mode during spinner execution for keyboard input"
steps = [
  "Run ralph with a multi-iteration session in an interactive terminal",
  "Verify raw mode is enabled when spinner starts",
  "Verify raw mode is disabled before subprocess stdout is written",
  "Verify raw mode is restored after subprocess output completes",
  "Verify raw mode is disabled on all exit paths (success, error, Ctrl+C)",
]
passes = true
acceptance = [
  "Raw mode is only active during spinner UI rendering, never during subprocess output",
  "RawModeGuard RAII pattern ensures cleanup on panic or error",
  "Subprocess stdout output is never garbled by terminal mode changes",
  "Non-interactive execution skips raw mode entirely",
]

[[stories]]
category = "keyboard-control"
description = "Implement soft stop (s key) to finish current iteration then exit"
steps = [
  "Run ralph with multiple iterations configured",
  "Press 's' during an iteration execution",
  "Verify spinner hints change to '[finishing...]'",
  "Verify current iteration completes normally",
  "Verify the run loop exits after current iteration without starting the next",
]
passes = true
acceptance = [
  "Pressing 's' sets a soft-stop flag checked at iteration boundaries",
  "Current subprocess execution is not interrupted",
  "Progress file is updated with completed iteration results",
  "Exit message indicates soft stop was requested",
  "Pressing 's' multiple times has no additional effect",
]

[[stories]]
category = "keyboard-control"
description = "Implement hard stop (S key) to immediately halt and save paused state"
steps = [
  "Run ralph with multiple iterations configured",
  "Press 'S' (shift+s) during an iteration execution",
  "Verify subprocess receives interrupt signal and terminates",
  "Verify paused state file is written to {data_dir}/paused.toml",
  "Verify the session can be resumed later with ralph run --resume",
]
passes = true
acceptance = [
  "Pressing 'S' sends SIGINT to running subprocess",
  "Paused state file contains session ID, current story index, and iteration number",
  "Exit message indicates hard stop with resume instructions",
  "Partial iteration output is not written to progress file",
  "Raw mode is properly disabled before exit",
]

[[stories]]
category = "keyboard-control"
description = "Implement pause (p key) to suspend and resume iteration execution"
steps = [
  "Run ralph with a multi-iteration session",
  "Press 'p' during iteration execution",
  "Verify spinner shows paused state with '[paused - p: resume]'",
  "Verify subprocess output continues to buffer internally",
  "Press 'p' again to resume",
  "Verify buffered output is displayed and execution continues",
]
passes = true
acceptance = [
  "Pressing 'p' toggles pause state",
  "Subprocess continues running while paused (output buffered)",
  "Spinner animation stops and shows pause indicator when paused",
  "Resuming displays any buffered output immediately",
  "Pause state does not affect iteration timing or results",
]

[[stories]]
category = "keyboard-control"
description = "Poll keyboard events without blocking subprocess I/O"
steps = [
  "Run ralph with a multi-iteration session",
  "Verify keyboard polling uses non-blocking poll with zero timeout",
  "Verify subprocess stdout is read and displayed with minimal latency",
  "Press keys rapidly and verify no input is lost",
  "Verify Ctrl+C still triggers interrupt signal as before",
]
passes = true
acceptance = [
  "Keyboard polling uses event::poll(Duration::ZERO) pattern from replay_countdown.rs",
  "Subprocess output latency is not noticeably increased by keyboard polling",
  "All key presses are captured and processed",
  "Ctrl+C handling remains unchanged (triggers signal::is_interrupted())",
  "Unknown keys are ignored without error",
]

# ============================================================================
# Bugfixes for Keyboard Controls
# ============================================================================

[[stories]]
category = "bugfix"
description = "Add missing SoftStop handler to update spinner hints to [finishing...] state"
steps = [
  "Open crates/ralph/src/subprocess/spinner.rs",
  "Locate the keyboard.poll() handler block (around line 559)",
  "Add SoftStop handler after HardStop block and before Pause block",
  "When SoftStop detected: call spinner.set_key_hint_state(KeyHintState::Finishing)",
  "Do not clear the action (let it propagate to caller for loop exit)",
  "Run ralph with multiple iterations and press 's' during execution",
  "Verify spinner hints change to '[finishing...]' immediately",
]
passes = true
acceptance = [
  "Pressing 's' updates spinner hints to '[finishing...]' within one spinner tick",
  "Subprocess continues running normally after 's' is pressed",
  "SoftStop action is returned to caller (not cleared like Pause)",
  "Run loop exits after current iteration completes",
  "No regression in HardStop or Pause behavior",
]

[[stories]]
category = "bugfix"
description = "Change subprocess stdin from inherit to null so parent can capture keypresses"
steps = [
  "Open crates/ralph/src/subprocess/spinner.rs",
  "Locate the Command::new spawn block (around line 329)",
  "Change .stdin(Stdio::inherit()) to .stdin(Stdio::null())",
  "Run ralph with multiple iterations and press 's' during spinner display",
  "Verify keypress is NOT echoed to terminal",
  "Verify spinner hints change to '[finishing...]' when 's' is pressed",
  "Verify 'p' toggles pause state and 'S' triggers hard stop",
]
passes = true
acceptance = [
  "Keypresses (s, S, p) are not echoed to terminal output",
  "Keypresses are captured by crossterm and trigger appropriate actions",
  "Soft stop (s) updates spinner to '[finishing...]' and exits after iteration",
  "Hard stop (S) kills subprocess immediately",
  "Pause (p) toggles pause state with output buffering",
  "Claude CLI execution is not affected (prompts passed via command line)",
]

[[stories]]
category = "bugfix"
description = "Keep raw mode enabled during spinner display regardless of output frequency"
steps = [
  "Open crates/ralph/src/subprocess/spinner.rs",
  "After writing output (around line 527), re-enable raw mode if spinner is active",
  "After writing stderr (around line 554), re-enable raw mode if spinner is active",
  "Ensure raw mode is only fully disabled when spinner stops or subprocess exits",
  "Run ralph and press 's' while output is streaming rapidly",
  "Verify keypresses are captured and not echoed to terminal",
]
passes = true
acceptance = [
  "Raw mode remains enabled whenever spinner is showing key hints",
  "Keypresses are captured even during rapid output streaming",
  "Keys (s, S, p) are not echoed to terminal at any time during spinner display",
  "Raw mode is properly disabled before subprocess output is printed (to avoid corruption)",
  "Raw mode is re-enabled immediately after output is printed if spinner is active",
]

