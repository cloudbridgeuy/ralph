# Ralph PRD - Pending Stories

[[stories]]
category = "ui"
description = "Make before/after line number colors more vibrant and visible"
steps = [
  "Increase saturation of red background for 'before' line numbers",
  "Increase saturation of green background for 'after' line numbers",
  "Ensure colors are distinct but not harsh on dark terminal backgrounds",
  "Test visibility across common terminal color schemes",
]
passes = true
acceptance = [
  "Red and green line number backgrounds are immediately distinguishable",
  "Colors pop without being distracting or garish",
  "Syntax highlighting on code content remains clearly readable",
  "Works well on both dark and light terminal themes",
]

[[stories]]
category = "ui"
description = "Remove arrow from Read tool line number format"
steps = [
  "Detect Read tool result content with cat -n format (number→content)",
  "Replace arrow separator (→) with pipe separator (│)",
  "Preserve original line numbers without renumbering",
  "Apply transformation before syntax highlighting",
]
passes = true
acceptance = [
  "Line format transforms from '505→content' to '505 │ content'",
  "Arrow character (→) no longer appears in Read tool output",
  "Line numbers remain left-aligned and readable",
  "Works with partial file reads (offset/limit parameters)",
  "Non-cat-n format content passed through unchanged",
]

# =============================================================================
# Write Tool Improvements
# =============================================================================

[[stories]]
category = "ui"
description = "Display new file content without diff format for Write tool"
steps = [
  "Detect when Write tool creates a new file (file didn't exist before)",
  "For new files, display content with syntax highlighting but no diff markers",
  "Show line numbers with green background (matching Edit tool style)",
  "Keep diff format only for file overwrites where before content exists",
]
passes = true
acceptance = [
  "New files show clean syntax-highlighted content without +/- markers",
  "Line numbers displayed with green background indicating addition",
  "File header shows '(new file)' indicator",
  "Overwrites still show before/after or unified diff as appropriate",
  "Large new files truncated with '... N more lines' indicator",
]

[[stories]]
category = "ui"
description = "Use before/after display for Write tool overwrites"
steps = [
  "When Write tool overwrites existing file, capture before content",
  "Display before block with red line number background",
  "Display after block with green line number background",
  "Apply syntax highlighting to both blocks",
]
passes = false
acceptance = [
  "Overwrites show before/after blocks like Edit tool",
  "Syntax highlighting applied based on file extension",
  "Line numbers right-aligned and consistent width",
  "Horizontal rule separates before and after blocks",
]

