  "Replay renders each block using the same logic as live execution",
  "Replay displays iteration headers and metadata",
  "Replay output is visually identical to live execution output",
]

[[stories]]
category = "replay"
description = "Persist output blocks on SIGTERM or SIGINT interruption"
steps = [
  "Run `ralph run` and interrupt with Ctrl+C (SIGINT)",
