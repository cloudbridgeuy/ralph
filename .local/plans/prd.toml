[[stories]]
category = "runtime-control"
description = "Implement non-blocking keyboard input monitoring for ralph run only"
# DESCOPED: Raw terminal mode for keyboard input corrupts subprocess stdout.
# Decision: Use signal-based interruption (Ctrl+C) instead. See docs/context/runtime-control.md
steps = [
  "DESCOPED - keyboard monitoring removed due to terminal mode conflicts",
  "Signal-based interruption via SIGINT/SIGTERM implemented instead",
  "Documentation updated in docs/context/runtime-control.md",
]
passes = true
acceptance = [
  "Signal-based interruption works correctly",
  "Ctrl+C cleanly interrupts and finalizes session",
  "Documentation explains why keyboard controls were descoped",
]

