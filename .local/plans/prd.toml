# =============================================================================
# Edit Tool Diff Display (requires before/after state tracking)
# =============================================================================
# Note: Claude CLI Edit tool returns success messages like "File updated",
# NOT diff content. To show diffs, we must track file state ourselves.

[[stories]]
category = "functional"
description = "Capture file content before Edit tool execution"
steps = [
  "When Edit tool invocation is detected, extract file_path from input",
  "Read current file content from disk before tool executes",
  "Store content in pending_edit_snapshots map keyed by tool_use_id",
  "Handle file not found gracefully (store None, skip diff later)",
  "Clean up old snapshots to prevent memory leaks",
]
passes = false
acceptance = [
  "File content captured when Edit tool_use event arrives",
  "Content stored with tool_use_id as key for later correlation",
  "Missing files don't cause errors (graceful skip)",
  "Snapshots cleaned up after result processing",
  "Works with concurrent Edit tool calls (multiple pending snapshots)",
]

[[stories]]
category = "functional"
description = "Generate diff when Edit tool result arrives"
steps = [
  "When Edit tool result arrives, look up snapshot by tool_use_id",
  "If snapshot exists and result is success, read current file content",
  "Generate unified diff between before and after content",
  "If no snapshot or file unchanged, skip diff generation",
  "Remove snapshot from pending map after processing",
]
passes = false
acceptance = [
  "Diff generated by comparing snapshot to current file content",
  "Unchanged files show no diff (or minimal 'no changes' message)",
  "Error results skip diff generation entirely",
  "Snapshot correlation uses tool_use_id correctly",
  "Works when file was created (before = empty)",
]

[[stories]]
category = "ui"
description = "Display Edit tool diff with syntax highlighting"
steps = [
  "Format generated diff with file path header",
  "Apply diff coloring (green additions, red deletions)",
  "Apply language syntax highlighting based on file extension",
  "Truncate very large diffs with '... N more lines' indicator",
  "Fall back to basic coloring when syntect unavailable",
]
passes = false
acceptance = [
  "Diff has syntax highlighting based on file type (rust, python, js, etc.)",
  "Added lines (+) shown in green with syntax colors",
  "Removed lines (-) shown in red with syntax colors",
  "File path shown prominently before diff (e.g., '── src/main.rs ──')",
  "Large diffs truncated with count of hidden lines (default 50 lines)",
  "Non-terminal output shows plain diff without ANSI codes",
]

