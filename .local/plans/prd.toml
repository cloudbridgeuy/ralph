# PRD: Simplified Context Model with Progressive Disclosure
#
# This PRD removes the design.md and progress.txt concepts in favor of:
# - Git history for historical context (semantic commits)
# - Progressive Disclosure pattern for architectural context (CLAUDE.md -> docs/context/*.md)
# - PRD as the only required context file

[[stories]]
category = "prompt-template"
description = "Rewrite PROMPT_TEMPLATE with new workflow: git history, Progressive Disclosure, and phase separation"
steps = [
    "Review current PROMPT_TEMPLATE in crates/core/src/context.rs",
    "Remove @{design_file} and @{progress_file} references",
    "Keep only @{prd_file} as the context file reference",
    "Add instructions to use 'git log --oneline' for recent commit context",
    "Add instructions to consult CLAUDE.md and linked docs/context/*.md for architectural context",
    "Add clear phase separation: work phase then commit phase",
    "In commit phase: update relevant docs per Progressive Disclosure, make semantic commit",
    "Instruct agent to determine which docs need updating based on the PRD story being implemented",
    "Run cargo xtask lint to verify compilation"
]
passes = true
acceptance = [
    "PROMPT_TEMPLATE only references @{prd_file}",
    "Instructions tell agent to use git log for historical context",
    "Instructions tell agent to consult CLAUDE.md for Progressive Disclosure docs",
    "Clear phase separation: work first, then document and commit at end",
    "Agent instructed to update docs/context/*.md or CLAUDE.md based on PRD story",
    "Semantic commit instruction included without Claude attribution"
]

