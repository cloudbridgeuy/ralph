# =============================================================================
# Layer 1E: Integration Testing
# =============================================================================

[[stories]]
category = "internal"
description = "Integration test for run loop with JSON parsing"
steps = [
  "Create test fixture with sample stream-json output",
  "Mock subprocess to return fixture data",
  "Execute run() with mock subprocess",
  "Verify IterationLog contains parsed metadata, tool_calls, and chunks",
  "Verify session is finalized with correct outcome",
]
passes = false
acceptance = [
  "Test covers successful iteration with all fields populated",
  "Test covers iteration with missing optional fields (graceful defaults)",
  "Test covers malformed JSON lines (logged, not crashed)",
  "Test runs in CI without external dependencies",
]

[[stories]]
category = "internal"
description = "Integration test for streaming output with highlighting"
steps = [
  "Create test fixture with mixed prose/code/diff content",
  "Mock subprocess with streaming output (line by line)",
  "Capture stdout during streaming",
