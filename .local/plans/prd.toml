  "'interrupted' shown for signal-terminated sessions",
  "'aborted' shown for user-chosen abort at prompt",
  "'in_progress' only for sessions that crashed without cleanup",
  "--outcome=interrupted filters to interrupted sessions only",
  "Backward compatible: existing 'aborted' sessions unchanged",
