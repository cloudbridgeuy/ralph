]
passes = true
acceptance = [
  "Extracts text from single-content messages",
  "Handles multi-content messages (text + tool_use mixed)",
  "Returns empty string for tool-only messages",
  "Preserves text ordering from content array",
]

[[stories]]
category = "functional"
description = "Extract tool invocations from assistant events"
steps = [
  "Iterate through message.content array",
  "Filter for ContentBlock::ToolUse variants",
