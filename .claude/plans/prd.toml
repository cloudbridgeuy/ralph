[[stories]]
category = "functional"
description = "Implement ralph sessions command"
steps = [
  "Add Sessions variant to SubCommands",
  "Read ~/.config/ralph/sessions.toml",
  "List all sessions with key metadata",
  "Format as table: slug, project, date, iterations, outcome"
]
passes = false
acceptance = [
  "Shows all sessions across all projects",
  "Sorted by date (most recent first)",
  "Truncates long project paths gracefully",
  "Empty state shows helpful message"
]

[[stories]]
category = "internal"
description = "Write default prompt template"
steps = [
  "Draft prompt based on original bash script",
  "Include placeholders for context files",
  "Include instructions for single-feature focus",
  "Include PRD update and progress.txt instructions",
  "Include commit instruction without attribution",
  "Include completion marker instruction"
]
passes = false
acceptance = [
  "Prompt works with claude CLI out of the box",
